name: CI

# This project's deps.edn pins langgraph and langchain-store via
# in-monorepo :local/root paths (../../kotoba-lang/langgraph,
# .../langchain-store), and the :dev alias overrides langchain the same
# way. Those don't resolve on a bare single-repo checkout, so the test
# job reconstructs the workspace layout by checking out all three
# siblings (all PUBLIC) into the expected relative paths -- no token
# needed. Same pattern already used by cloud-itonami-isic-2733 /
# cloud-itonami-isic-6209 / cloud-itonami-isic-4520 /
# cloud-itonami-iso3166-ago / cloud-itonami-iso3166-jpn-mod.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-iso3166-usa-gsa }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain-store
          path: orgs/kotoba-lang/langchain-store
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test (governor contract · facts · phases · registry · store)
        working-directory: orgs/cloud-itonami/cloud-itonami-iso3166-usa-gsa
        run: clojure -M:dev:test
